spring.application.name=retread-api
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/retread_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:retread_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:retread_password}
jwt.secret=${JWT_SECRET}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173}
app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.tenant-name=${APP_BOOTSTRAP_ADMIN_TENANT_NAME:Tenant Inicial}
app.bootstrap-admin.tenant-slug=${APP_BOOTSTRAP_ADMIN_TENANT_SLUG:default}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
