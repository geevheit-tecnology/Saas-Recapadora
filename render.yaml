services:
  - type: web
    name: retread-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: retread-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: retread-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: retread-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET
        generateValue: true
      - key: APP_SECURITY_ALLOWED_ORIGINS
        sync: false
      - key: APP_BOOTSTRAP_ADMIN_ENABLED
        value: false
      - key: APP_BOOTSTRAP_ADMIN_TENANT_NAME
        sync: false
      - key: APP_BOOTSTRAP_ADMIN_TENANT_SLUG
        sync: false
      - key: APP_BOOTSTRAP_ADMIN_USERNAME
        sync: false
      - key: APP_BOOTSTRAP_ADMIN_PASSWORD
        sync: false

databases:
  - name: retread-db
    databaseName: retread_db
    user: retread_user
    plan: basic-256mb
